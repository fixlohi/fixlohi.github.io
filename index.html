  <title>HILOFIX | Quality Refurbished Laptops to match your budget</title>
  <meta name="description" content="HILOFIX supplies quality refurbished laptops to individuals and businesses in Croydon, across the UK and beyond. Reliable hardware, to match your needs and budget.">
  <link rel="canonical" href="https://hilofix.com/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="/logo.png" as="image">

  <link rel="icon" href="/favicon.ico" sizes="any">

  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" media="print" onload="this.media='all'">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f7fa;
      --card:#fff;
      --text:#333;
      --muted:#888;
      --line:#e0e0e0;
      --link:#0066cc;
      --accent:#25D366;
      --cta-bg:#1a5c2a;
      --cta-bg-hover:#144821;
      --cta-text:#fff;
      --shadow:0 10px 30px rgba(0,0,0,.08)
    }
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 0 5vh;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif
    }
    .card{
      width:min(90%,600px);
      padding:40px 30px;
      text-align:center;
      background:var(--card);
      border-radius:12px;
      box-shadow:var(--shadow)
    }
    .logo{
      display:block;
      margin:0 auto 20px;
      max-width:120px;
      height:auto
    }
    .page-title{
      margin-bottom:14px;
      font-size:16px;
      font-weight:600;
      line-height:1.35;
      color:var(--text)
    }
    .page-title .highlight{color:inherit}
    .cta-wrap{
      display:flex;
      justify-content:center;
      margin:0 0 22px
    }
    .cta-button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:32px;
      padding:0 12px;
      border-radius:999px;
      background:var(--cta-bg);
      color:var(--cta-text);
      text-decoration:none;
      font-size:12.5px;
      font-weight:600;
      line-height:1;
      box-shadow:0 6px 18px rgba(26,92,42,.18);
      transition:background-color .2s ease,transform .2s ease
    }
    .cta-button:hover,
    .cta-button:focus-visible{
      background:var(--cta-bg-hover);
      transform:translateY(-1px)
    }
    .contact a{
      color:var(--link);
      text-decoration:none
    }
    .contact a:hover,
    .contact a:focus-visible{text-decoration:underline}
    .contact-list{
      display:inline-flex;
      flex-direction:column;
      align-items:flex-start;
      gap:8px;
      margin:4px auto
    }
    .contact-item{
      display:flex;
      align-items:center
    }
    .icon{
      width:22px;
      margin-right:6px;
      flex-shrink:0;
      display:inline-flex;
      justify-content:center
    }
    .email-text{margin-left:3px}
    .divider{
      width:40px;
      height:1px;
      margin:16px auto;
      background:var(--line)
    }
    .address{
      margin:8px 0 16px;
      font-size:15px;
      line-height:1.7;
      font-style:normal
    }
    .legal{
      margin-top:4px;
      color:var(--muted);
      font-size:13px
    }
    @media (max-width:480px){
      .card{padding:30px 20px}
    }
  </style>
</head>

      </address>

    </section>
  </main>
