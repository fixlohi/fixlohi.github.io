<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HILOFIX</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="192x1192" href="/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x1512" href="/android-chrome-512x512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 600px;
      width: 90%;
    }

    .logo {
      display: block;
      margin: 0 auto 20px auto;
      max-width: 120px;
    }

    .tagline {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 25px;
    }

    .tagline .highlight {
      color: #1a5c2a;
    }

    .contact p {
      margin: 8px 0;
      font-size: 15px;
    }

    .contact a {
      color: #0066cc;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    .address {
      margin: 8px 0 16px;
      font-size: 15px;
      line-height: 1.7;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #e0e0e0;
      margin: 16px auto;
    }

    .legal {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="logo.png" alt="Hilofix Logo" class="logo">

    <div class="tagline">Quality <span class="highlight">Refurbished</span> Laptops</div>

    <div class="contact">
      <p>Email: <a href="mailto:info@hilofix.com">info@hilofix.com</a></p>
      <p>Phone: <a href="tel:+447587708248">+44 7587 708208</a></p>

      <div class="divider"></div>

      <div class="address">
        Square Root Business Centre<br>
        102–116 Windmill Road<br>
        Croydon, Surrey<br>
        CR0 2XQ
      </div>

      <div class="divider"></div>

      <p class="legal">Registered in England and Wales &middot; Company no. 17142131</p>
    </div>
  </div>

</body>
</html>
