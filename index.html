  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f7fa;
      --card:#fff;
      --text:#333;
      --muted:#888;
      --line:#e0e0e0;
      --link:#0066cc;
      --shadow:0 10px 30px rgba(0,0,0,.08)
    }
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 0 5vh;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif
    }
    .card{
      width:min(90%,600px);
      padding:40px 30px;
      text-align:center;
      background:var(--card);
      border-radius:12px;
      box-shadow:var(--shadow)
    }
    .logo{
      display:block;
      margin:0 auto 20px;
      max-width:120px;
      height:auto
    }
    .contact a{
      color:var(--link);
      text-decoration:none
    }
    .contact a:hover,
    .contact a:focus-visible{text-decoration:underline}
    .contact-list{
      display:inline-flex;
      flex-direction:column;
      align-items:flex-start;
      gap:8px;
      margin:4px auto
    }
    .contact-item{
      display:flex;
      align-items:center
    }
    .icon{
      width:22px;
      margin-right:6px;
      flex-shrink:0;
      display:inline-flex;
      justify-content:center
    }
    .email-text{margin-left:3px}
    .divider{
      width:40px;
      height:1px;
      margin:16px auto;
      background:var(--line)
    }
    .address{
      margin:8px 0 16px;
      font-size:15px;
      line-height:1.7;
      font-style:normal
    }
    .legal{
      margin-top:4px;
      color:var(--muted);
      font-size:13px
    }
    .legal-link{
      display:inline-block;
      margin-top:8px;
      color:inherit;
      text-decoration:underline
    }
    @media (max-width:480px){
      .card{padding:30px 20px}
    }
  </style>
</head>
