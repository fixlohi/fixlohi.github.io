  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 600px;
      width: 90%;
    }

    .logo {
      display: block;
      margin: 0 auto 20px auto;
      max-width: 120px;
    }

    .tagline {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 25px;
    }

    .tagline .highlight {
      color: #1a5c2a;
    }

    .contact p {
      margin: 8px 0;
      font-size: 15px;
    }

    .contact a {
      color: #0066cc;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    .address {
      margin: 8px 0 16px;
      font-size: 15px;
      line-height: 1.7;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #e0e0e0;
      margin: 16px auto;
    }

    .legal {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }
    }
