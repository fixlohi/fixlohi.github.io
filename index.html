<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hilofix</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .logo {
      max-width: 180px; /* increased from 120px */
      margin-bottom: 20px;
    }

    .tagline {
      font-size: 16px;
      font-weight: 600; /* bold */
      color: #333;
      margin-bottom: 25px;
    }

    .contact p {
      margin: 8px 0;
      font-size: 15px;
    }

    .contact a {
      color: #0066cc;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="logo.png" alt="Logo" class="logo">

    <div class="tagline">Quality Refurbished Laptops</div>

    <div class="contact">
      <p>Email: <a href="mailto:info@hilofix.com">info@hilofix.com</a></p>
      <p>Phone: <a href="tel:+447587708248">+44 7587 708208</a></p>
      <p>Company number: 17142131</p>
    </div>
  </div>

</body>
</html>
