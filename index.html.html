<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name or Company</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .logo {
      max-width: 120px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .tagline {
      font-size: 14px;
      color: #777;
      margin-bottom: 25px;
    }

    .contact p {
      margin: 8px 0;
      font-size: 15px;
    }

    .contact a {
      color: #0066cc;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="logo.png" alt="Logo" class="logo">

    <h1>Your Name or Company</h1>
    <div class="tagline">Short description or tagline goes here</div>

    <div class="contact">
      <p>Email: <a href="mailto:your@email.com">your@email.com</a></p>
      <p>Phone: <a href="tel:+441234567890">+44 1234 567890</a></p>
      <p>Website: <a href="#">yourwebsite.com</a></p>
    </div>
  </div>

</body>
</html>
